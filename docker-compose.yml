services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: md-telegraph-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "-m", "app.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

