name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"

      - name: Check lockfile
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy app

      - name: Tests
        run: uv run pytest

      - name: Docker build
        run: docker build -t md-telegraph:${{ github.sha }} .

